services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-app
    volumes:
      - .:/var/www/html:cached
      # Eigenes Volume für SQLite-Datenbanken der App
      - app-sqlite:/var/www/html/var/sqlite
    ports:
      - "8080:80"          # PHP-Apache Webserver
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - SANDBOX_EVAL_URL=http://sandbox/api/php-eval.php
      # DB-Verbindungsdaten für PHP
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=app
      - DB_USERNAME=app
      - DB_PASSWORD=app
      # Mailhog SMTP
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      - db
      - mailhog

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-sandbox
    volumes:
      # Nur den Projektcode read-only einbinden
      - .:/var/www/html:ro
      # Eigenes Volume für SQLite-Übungsdatenbanken
      - sandbox-sqlite:/var/www/html/var/sqlite
    ports:
      - "8081:80"          # Separater Port für den Sandbox-Webserver
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - SANDBOX_MODE=1
    # Kein depends_on auf db, keine DB_* Umgebungsvariablen

  db:
    image: mysql:8.0
    container_name: php-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=app
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app
    ports:
      - "3306:3306"         # optional von Host erreichbar
    volumes:
      - db-data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

volumes:
  db-data:
  sandbox-sqlite:
  app-sqlite:
