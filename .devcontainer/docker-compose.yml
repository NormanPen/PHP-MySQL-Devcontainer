services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: php-app
    volumes:
      - ..:/var/www/html:cached
    ports:
      - "8080:80"          # PHP-Apache Webserver
    environment:
      # DB-Verbindungsdaten für PHP
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=app
      - DB_USERNAME=app
      - DB_PASSWORD=app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: php-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=app
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app
    ports:
      - "3306:3306"         # optional von Host erreichbar
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
